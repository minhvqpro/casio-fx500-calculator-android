name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Fix permissions
      run: chmod +x gradlew
    
    - name: Build Debug APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew clean assembleDebug --no-daemon
    
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: casio-fx500-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
    
    - name: Build Release APK
      run: |
        export ANDROID_HOME=$ANDROID_SDK_ROOT
        ./gradlew assembleRelease --no-daemon
    
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: casio-fx500-release-apk
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        tag_name: v${{ github.run_number }}
        name: Casio FX-500 Calculator v${{ github.run_number }}
        body: |
          ## Casio FX-500 Calculator
          
          ### Features:
          - Basic arithmetic operations (+, -, ×, ÷)
          - Square root (√) and percentage (%)
          - Memory functions (MRC, M+, M-)
          - Sign toggle (+/-)
          - Clear (C) and All Clear (AC)
          
          ### Download:
          - Debug APK: `app-debug.apk`
          - Release APK: `app-release-unsigned.apk`
        files: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
